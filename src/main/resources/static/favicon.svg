<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#080808"/>
  
  <!-- Film reel outer circle -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  
  <!-- Film reel inner circle -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#c9a84c"/>
  
  <!-- Reel holes - 6 around the inner circle -->
  <circle cx="16" cy="9.5" r="1.2" fill="#c9a84c"/>
  <circle cx="16" cy="22.5" r="1.2" fill="#c9a84c"/>
  <circle cx="9.5" cy="16" r="1.2" fill="#c9a84c"/>
  <circle cx="22.5" cy="16" r="1.2" fill="#c9a84c"/>
  <circle cx="11.3" cy="11.3" r="1.2" fill="#c9a84c"/>
  <circle cx="20.7" cy="20.7" r="1.2" fill="#c9a84c"/>

  <!-- Film strip top -->
  <rect x="3" y="2" width="26" height="3.5" rx="0.5" fill="#c9a84c" opacity="0.15"/>
  <rect x="5" y="2.5" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="9.5" y="2.5" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="14" y="2.5" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="18.5" y="2.5" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="23" y="2.5" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>

  <!-- Film strip bottom -->
  <rect x="3" y="26.5" width="26" height="3.5" rx="0.5" fill="#c9a84c" opacity="0.15"/>
  <rect x="5" y="27" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="9.5" y="27" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="14" y="27" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="18.5" y="27" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
  <rect x="23" y="27" width="2.5" height="2.5" rx="0.3" fill="#c9a84c" opacity="0.6"/>
</svg>
