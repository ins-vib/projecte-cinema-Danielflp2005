<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Cines — IMPERIAL</title>
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/cinema.css}" />
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>

<body>

  <div th:replace="~{layoutadmin :: layoutadmin(~{::content})}">
    <div th:fragment="content">

      <div class="table-header">
        <h1>Lista de Cines</h1>
        <a class="btn-primary" th:href="@{/admin/cinemes/create}">+ Añadir Nuevo Cine</a>
      </div>

      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cinema : ${Lista}">
            <td th:text="${cinema.cinemaName}"></td>
            <td th:text="${cinema.city}"></td>
            <td>
              <a class="btn-secondary" th:href="@{/admin/cinema/{id}(id=${cinema.id})}">Ver detalles</a>
              <a class="btn-secondary" th:href="@{/admin/cinemes/edit/{id}(id=${cinema.id})}">Editar</a>
              <a class="btn-secondary btn-danger" th:href="@{/admin/cinema/delete/{id}(id=${cinema.id})}">Borrar</a>
            </td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

</body>

</html>
