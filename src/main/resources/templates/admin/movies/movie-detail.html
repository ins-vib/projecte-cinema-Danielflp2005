<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${movie.title} + ' — IMPERIAL'">Película — IMPERIAL</title>
  <link rel="stylesheet" th:href="@{/css/movie-detalles.css}" />
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>

<body>
  <!-- ═══ HERO ═══ -->
  <section class="hero">
    <div class="hero-bg" th:style="'background-image: url(/images/' + ${movie.posterUrl} + ')'"></div>
    <div class="hero-overlay"></div>

    <!-- Nav -->
    <nav class="hero-nav">
      <a th:href="@{/admin}" class="nav-logo">IMPERIAL<span>/ CINE</span></a>
      <div class="hero-nav__links">
        <a th:href="@{/admin}" class="btn-back">← Inicio</a>
        <a th:href="@{/admin/movies/billboard}" class="btn-back">← Cartelera</a>
      </div>
    </nav>

    <!-- Main content left -->
    <div class="hero-content">
      <div class="movie-genre-tags">
        <span class="genre-tag" th:text="${movie.gener}">Género</span>
      </div>
      <h1 class="movie-title" th:text="${movie.title}">Título</h1>
      <p class="movie-desc" th:text="${movie.descripcion}">Descripción.</p>
      <div class="hero-actions">
        <a th:href="@{/admin/screening/create/{id}(id=${movie.id})}" class="btn-schedule">
          <span>Programar sesión</span>
        </a>
      </div>
    </div>

    <!-- Meta pills top right -->
    <div class="hero-meta">
      <div class="meta-row">
        <span class="meta-key">Género</span>
        <span class="meta-pill" th:text="${movie.gener}">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Duración</span>
        <span class="meta-pill" th:text="${movie.min} + ' min'">— min</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Estreno</span>
        <span class="meta-pill" th:text="${#temporals.format(movie.date, 'dd MMM yyyy')}">—</span>
      </div>
    </div>

    <div class="scroll-hint">Más info</div>
  </section>

  <!-- ═══ INFO SECTION ═══ -->
  <section class="info-section">
    <div class="info-inner">
      <div class="synopsis-block">
        <div class="section-eyebrow">Sinopsis</div>
        <h2 class="section-title">Sobre la película</h2>
        <p class="synopsis-text" th:text="${movie.descripcion}">Descripción completa.</p>
      </div>

      <div class="movie-sidebar">
        <div class="sidebar-item">
          <span class="sidebar-key">Título</span>
          <span class="sidebar-val" th:text="${movie.title}">—</span>
        </div>
        <div class="sidebar-item">
          <span class="sidebar-key">Género</span>
          <span class="sidebar-val" th:text="${movie.gener}">—</span>
        </div>
        <div class="sidebar-item">
          <span class="sidebar-key">Duración</span>
          <span class="sidebar-val" th:text="${movie.min} + ' min'">—</span>
        </div>
        <div class="sidebar-item">
          <span class="sidebar-key">Estreno</span>
          <span class="sidebar-val" th:text="${#temporals.format(movie.date, 'dd / MM / yyyy')}">—</span>

        </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="movie-footer">
    <a th:href="@{/admin}" class="movie-footer__logo">IMPERIAL<span>/ CINE</span></a>
    <p class="movie-footer__copy">© DAW1 2026</p>
    <nav class="movie-footer__nav">
      <a th:href="@{/admin}">Inicio</a>
      <a th:href="@{/admin/movies/billboard}">Cartelera</a>
      <a th:href="@{/admin/cinemes}">Cines</a>
    </nav>
  </footer>

</body>

</html>
