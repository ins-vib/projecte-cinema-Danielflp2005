<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Sesión — Lumière</title>
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/cinema-create.css}" />
  <link rel="stylesheet" th:href="@{/css/screenings.css}" />
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>

  <div th:replace="~{layoutadmin :: layoutadmin(~{::content})}">
    <div th:fragment="content">

      <form th:action="@{/admin/screening/edit}" th:object="${screening}" method="post">
        <legend>Editar Sesión</legend>

        <input type="hidden" name="id" th:value="${screening.id}">
        <input type="hidden" name="movie.id" th:value="${screening.movie.id}">
        <input type="hidden" name="returnUrl" th:value="${returnUrl}">

        <!-- Película -->
        <div class="field-group">
          <label>Película</label>
          <select name="movie.id">
            <option th:each="movie : ${movies}"
                    th:value="${movie.id}"
                    th:text="${movie.title}"
                    th:selected="${movie.id == screening.movie.id}">Película</option>
          </select>
        </div>

        <!-- Sala -->
        <div class="field-group">
          <label>Sala</label>
          <select name="room.id">
            <option th:each="room : ${rooms}"
                    th:value="${room.id}"
                    th:text="${room.name} + ' — ' + ${room.cinema.cinemaName}"
                    th:selected="${room.id == screening.room.id}">Sala</option>
          </select>
        </div>

        <!-- Fecha y hora -->
        <div class="field-group">
          <label>Fecha y hora</label>
          <input type="datetime-local" th:field="*{screeningDateTime}" />
        </div>

        <!-- Precio -->
        <div class="field-group">
          <label>Precio (€)</label>
          <input type="number" step="0.50" min="0" th:field="*{precio}" />
        </div>

        <button type="submit"><span>Guardar cambios</span></button>
      </form>

    </div>
  </div>

</body>
</html>
