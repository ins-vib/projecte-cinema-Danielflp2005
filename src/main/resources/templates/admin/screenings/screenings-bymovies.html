<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${movie.title} + ' — Sesiones — IMPERIAL'">Sesiones — IMPERIAL</title>
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/screenings.css}" />
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>

<body>

  <div th:replace="~{layoutadmin:: layoutadmin(~{::content})}">
    <div th:fragment="content">

      <div class="screenings-header">
        <div class="screenings-header__text">
          <span class="eyebrow">// SESIONES</span>
          <h1 th:text="${movie.title}">Película</h1>
        </div>
        <div class="screenings-header__actions">
          <a class="sc-btn sc-btn--detail" th:href="@{/admin/screenings}">← Volver</a>
          <a class="sc-btn sc-btn--edit" th:href="@{/admin/screening/create/{id}(id=${movie.id})}">+ Nueva sesión</a>
        </div>
      </div>

      <!-- Poster strip -->
      <div class="movie-strip" th:style="'background-image: url(/images/' + ${movie.posterUrl} + ')'">
        <div class="movie-strip__overlay"></div>
        <div class="movie-strip__meta">
          <span th:text="${movie.gener}">Género</span>
          <span>·</span>
          <span th:text="${movie.min} + ' min'">— min</span>
        </div>
      </div>

      <!-- Lista de sesiones -->
      <div class="screenings-grid" th:if="${not #lists.isEmpty(screenings)}">
        <div class="screening-card" th:each="screening : ${screenings}">

          <div class="screening-card__date">
            <span class="screening-card__day"
              th:text="${#temporals.format(screening.screeningDateTime, 'dd')}">01</span>
            <span class="screening-card__month"
              th:text="${#temporals.format(screening.screeningDateTime, 'MMM')}">ENE</span>
          </div>

          <div class="screening-card__info">
            <div class="screening-card__movie" th:text="${#temporals.format(screening.screeningDateTime, 'EEEE')}">Lunes
            </div>
            <div class="screening-card__meta">
              <span class="screening-card__room" th:text="${screening.room.name}">Sala</span>
              <span class="screening-card__sep">·</span>
              <span class="screening-card__time"
                th:text="${#temporals.format(screening.screeningDateTime, 'HH:mm')}">20:00</span>
              <span class="screening-card__sep">·</span>
              <span class="screening-card__price" th:text="${screening.precio} + ' €'">0 €</span>
            </div>
          </div>

          <div class="screening-card__actions">
            <a class="sc-btn sc-btn--edit" th:href="@{/admin/screening/detail/{id}(id=${screening.id})}">Ver
              detalles</a>
            <a class="sc-btn sc-btn--edit" th:href="@{/admin/screening/edit/{id}(id=${screening.id})}">Editar</a>
            <a class="sc-btn sc-btn--delete" th:href="@{/admin/screening/delete/{id}(id=${screening.id})}"
              onclick="return confirm('¿Eliminar esta sesión?')">Borrar</a>
          </div>

        </div>
      </div>

      <div class="screenings-empty" th:if="${#lists.isEmpty(screenings)}">
        <p>No hay sesiones programadas para esta película</p>
        <a class="sc-btn sc-btn--edit" th:href="@{/admin/screening/create/{id}(id=${movie.id})}">+ Programar primera
          sesión</a>
      </div>

    </div>
  </div>

</body>

</html>
