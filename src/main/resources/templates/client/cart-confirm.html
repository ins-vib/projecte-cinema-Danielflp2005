<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra confirmada — Lumière</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <link rel="stylesheet" th:href="@{/css/client-seats.css}" />
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>

  <header>
    <h1>Lumière</h1>
    <nav>
      <a th:href="@{/client}">Inicio</a>
      <a th:href="@{/client/billboard}">Cartelera</a>
      <a th:href="@{/logout}">Salir</a>
    </nav>
  </header>

  <main class="confirm-main">
    <div class="confirm-card">

      <div class="confirm-icon">✓</div>
      <h2 class="confirm-title">¡Compra confirmada!</h2>

      <p class="confirm-sub" th:if="${orderId != null}">
        Pedido <strong th:text="'#' + ${orderId}">—</strong> registrado correctamente.
      </p>
      <p class="confirm-sub" th:if="${orderId == null}">
        Tu reserva se ha completado.
      </p>

      <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:1.5rem;">
        <a th:if="${orderId != null}" th:href="@{/client/my-orders/{id}(id=${orderId})}" class="confirm-back">Ver mi pedido</a>
        <a th:href="@{/client/my-orders}" class="confirm-back">Mis pedidos</a>
        <a th:href="@{/client/billboard}" class="confirm-back">← Volver a cartelera</a>
      </div>

    </div>
  </main>

  <footer>
    <p>DAW1 2026 · Lumière</p>
  </footer>

</body>
</html>
