<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Lumière</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>

  <div class="grain"></div>

  <div class="film-strip film-strip--left">
    <div class="film-hole" th:each="i : ${#numbers.sequence(1, 14)}"></div>
  </div>
  <div class="film-strip film-strip--right">
    <div class="film-hole" th:each="i : ${#numbers.sequence(1, 14)}"></div>
  </div>

  <div class="login-wrapper">

    <div class="login-logo">
      <span class="login-logo__text">Lumière</span>
      <span class="login-logo__sub">/ CINE</span>
    </div>

    <div class="login-card">
      <div class="login-card__eyebrow">Acceso privado</div>
      <h1 class="login-card__title">Bienvenido</h1>
      <p class="login-card__subtitle">Introduce tus credenciales para continuar</p>

      <div class="login-error" th:if="${param.error}">
        <span>⚠ Credenciales incorrectas. Inténtalo de nuevo.</span>
      </div>

      <form th:action="@{/login}" method="post" class="login-form">

        <div class="login-field">
          <label class="login-field__label" for="username">Usuario</label>
          <input class="login-field__input" type="text" id="username"
            name="username" placeholder="tu usuario" autocomplete="username" required />
        </div>

        <div class="login-field">
          <label class="login-field__label" for="password">Contraseña</label>
          <input class="login-field__input" type="password" id="password"
            name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button class="login-btn" type="submit">
          <span class="login-btn__text">Entrar</span>
          <span class="login-btn__arrow">→</span>
        </button>

      </form>
    </div>

    <div class="login-footer">
      <a th:href="@{/}" class="login-footer__link">← Volver al inicio</a>
    </div>

  </div>

</body>
</html>
