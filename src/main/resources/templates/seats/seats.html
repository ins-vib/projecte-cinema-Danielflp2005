<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asientos — Lumière</title>
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/cinema.css}" />
  <link rel="stylesheet" th:href="@{/css/seats.css}" />
</head>

<body>

  <div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">

      
      <div class="table-header">
        <h1 th:text="${room.name}">Sala</h1>
        <a class="btn-back" th:href="@{/cinema/{id}(id=${room.cinema.id})}">← Volver</a>
        <a class="btn-add" th:href="@{/seats/new/{id}(id=${room.id})}">Crear asiento</a>
      </div>

      <table>
        <thead>
          <tr>
            <th>Número</th>
            <th>Fila</th>
            <th>Posición</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="seat : ${room.seat}">
            <td th:text="${seat.seatNumber}"></td>
            <td th:text="${seat.seatrow}"></td>
            <td th:text="${seat.x} + '-' + ${seat.y}"></td>
            <td th:text="${seat.type}"></td>
            <td th:text="${seat.estado} ? 'Ocupado' : 'Libre'"></td>
            <td>
              <a class="btn-secondary" th:href="@{/seats/detail/{id}(id=${seat.id})}">Ver Detalles</a>
              <a class="btn-secondary" th:href="@{/seats/edit/{id}(id=${seat.id})}">Editar</a>
              <a class="btn-secondary btn-danger" th:href="@{/seats/delete/{id}(id=${seat.id})}">Borrar</a>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Mapa visual de asientos -->
      <div class="seats-map">
        <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
          <g th:each="seat : ${room.seat}">
            <a th:href="@{/seats/edit/{id}(id=${seat.id})}">
              <svg class="seat" viewBox="0 0 491.5 491.5" width="30" height="30" th:x="${seat.x * 80}"
                th:y="${seat.y * 40}" xmlns="http://www.w3.org/2000/svg">
                <path d="M449.149,216.2v-99c0-64.7-53.4-117.2-119.1-117.2h-168.4
                  c-65.6,0-119.1,52.6-119.1,117.2v99
                  c-25,12.1-42.5,37.5-42.5,67.1v208.2h163.8V471h163.8v20.5h163.8V283.3
                  C491.649,253.7,474.149,228.2,449.149,216.2z
                  M122.949,307.2v41v102.4h-81.9V283.3
                  c0-16,11.2-29.4,26.2-32.8h0.2
                  c2.6-0.6,5-0.9,7.3-0.9h14.4
                  c18.6,0,33.8,15.1,33.8,33.8V307.2z
                  M327.749,348.1h-163.8v-41h163.8V348.1z
                  M368.749,450.5V348.1v-41v-23.9
                  c0-18.6,15.1-33.8,33.8-33.8h14.3
                  c2.3,0,4.7,0.3,7.3,0.9h0.2
                  c15,3.4,26.2,16.8,26.2,32.8v167.4H368.749z" fill="currentColor" />
              </svg>
            </a>
          </g>
        </svg>

        <!-- Leyenda -->
        <div class="seats-legend">
          <div class="legend-item">
            <span class="legend-dot legend-dot--free"></span>
            Libre
          </div>
          <div class="legend-item">
            <span class="legend-dot legend-dot--ocupado"></span>
            Ocupado
          </div>
          <div class="legend-item">
            <span class="legend-dot legend-dot--premium"></span>
            Premium
          </div>
        </div>
      </div>

    </div>
  </div>

</body>

</html>
