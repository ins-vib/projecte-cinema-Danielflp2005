<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form th:action="@{/services}" th:object="${servicesDTO}" method="post">

        <label th:each="s : ${allServices}">
            <input type="checkbox" th:field="*{services}" th:value="${s}">
            <span th:text="${s}"></span>
        </label>
    
        <button type="submit">Guardar</button>
    
    </form>
</body>

</html>
